<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Diagnostic Portal | neuroQWERTY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Doctor-specific extensions to style.css */
        body { height: auto; min-height: 100vh; padding: 40px 0; }
        
        .doctor-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            width: 95%;
            max-width: 1100px;
        }

        .card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-main:hover { opacity: 0.9; }

        .search-input {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid var(--progress-track);
            border-radius: 8px;
            outline: none;
        }

        .search-input:focus { border-color: var(--accent); }

        #chat-window {
            height: 400px;
            background: #fdfdfd;
            border: 2px solid var(--progress-track);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin: 20px 0;
            font-size: 0.95rem;
        }

        .msg { margin-bottom: 12px; line-height: 1.4; padding: 10px; border-radius: 8px; }
        .ai-msg { background: #f1f5f9; border-left: 4px solid var(--accent); }
        .dr-msg { background: #e0f2fe; text-align: right; }

        .biometric-chip {
            display: inline-block;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div id="progress-container"><div id="progress-bar" style="width: 100%"></div></div>
    
    <div class="doctor-grid">
        <div class="card">
            <header>
                <div id="logo">neuro<span>QWERTY</span></div>
                <div id="step-info">Clinical Review</div>
            </header>

            <div class="search-container">
                <input type="text" id="search-name" class="search-input" placeholder="Patient Name...">
                <button class="btn-main" onclick="searchPatient()">Search</button>
            </div>

            <div id="results" style="display:none;">
                <div id="task-title">Diagnostic Summary</div>
                <h2 id="display-name" style="margin: 5px 0 15px 0;">--</h2>
                
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">
                    <strong>History:</strong> <span id="display-history"></span>
                </p>

                <div id="biometric-tags">
                    </div>

                <div id="risk-box" style="margin-top:20px; padding:15px; border-radius:8px; text-align:center;">
                    <span id="risk-label" style="font-weight: 700; font-size: 1.1rem;">--</span>
                </div>
            </div>
        </div>

        <div class="card">
            <header>
                <div id="task-title">K2-Think Clinical Assistant</div>
            </header>
            
            <div id="chat-window">
                <div class="msg ai-msg">Please search for a patient to load biometric markers and begin clinical reasoning.</div>
            </div>

            <div class="search-container">
                <input type="text" id="chat-input" class="search-input" placeholder="Ask K2 about specific biomarkers...">
                <button class="btn-main" onclick="askAI()">Send</button>
            </div>
        </div>
    </div>

    <script src="doctor_logic.js"></script>
</body>
</html>
